<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 — 体彩推荐分析系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body class="login-bg">
<div class="container">
    <div class="row justify-content-center align-items-center min-vh-100">
        <div class="col-md-5 col-lg-4">
            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-body p-4 p-md-5">
                    <h3 class="text-center mb-1">🎰 体彩推荐分析系统</h3>
                    <p class="text-center text-muted small mb-4">登录后查看推荐</p>
                    {% with messages = get_flashed_messages(with_categories=true) %}
                    {% for cat, msg in messages %}
                    <div class="alert alert-{{ cat }} py-2">{{ msg }}</div>
                    {% endfor %}
                    {% endwith %}
                    <form method="post">
                        <div class="mb-3">
                            <label class="form-label">密码</label>
                            <input type="password" name="password" class="form-control form-control-lg"
                                   autofocus placeholder="请输入登录密码" required>
                        </div>
                        <button type="submit" class="btn btn-danger btn-lg w-100">登录</button>
                    </form>
                    <hr class="my-4">
                    <p class="text-muted small mb-0">
                        ⚠️ 免责声明：彩票每次开奖均为独立随机事件，任何算法都无法真正预测中奖号码。
                        本系统基于历史统计做参考推荐，仅供娱乐与研究，不构成投注建议。
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
